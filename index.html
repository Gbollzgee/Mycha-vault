<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>My Private Vault</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0a0a0f;--surface:#13131a;--surface2:#1c1c27;--border:#2a2a3d;
  --gold:#c9a84c;--gold2:#e8c96a;--text:#e8e8f0;--muted:#7a7a9a;
  --danger:#e05555;--success:#4caf7d;--radius:14px;--shadow:0 8px 40px rgba(0,0,0,0.5);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:0.4;}

/* LOADING */
#loading-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;z-index:9998;}
.loader-ring{width:48px;height:48px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
#loading-msg{color:var(--muted);font-size:0.85rem;}

/* LOGIN */
#login-page{display:none;align-items:center;justify-content:center;min-height:100vh;background:radial-gradient(ellipse at 30% 20%,#1a1025 0%,var(--bg) 60%),radial-gradient(ellipse at 70% 80%,#0d1a2a 0%,transparent 60%);}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:56px 48px;width:100%;max-width:420px;box-shadow:var(--shadow),0 0 80px rgba(201,168,76,0.05);animation:fadeUp 0.6s ease both;text-align:center;}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.vault-icon{width:72px;height:72px;background:linear-gradient(135deg,var(--gold),var(--gold2));border-radius:20px;display:flex;align-items:center;justify-content:center;margin:0 auto 28px;font-size:32px;box-shadow:0 8px 32px rgba(201,168,76,0.3);}
.login-card h1{font-family:'Playfair Display',serif;font-size:2rem;font-weight:700;margin-bottom:6px;background:linear-gradient(135deg,var(--gold),var(--gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.login-card>p{color:var(--muted);font-size:0.9rem;margin-bottom:36px;}
.input-wrap{position:relative;margin-bottom:16px;}
.input-wrap input{width:100%;padding:16px 20px;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:1rem;font-family:'DM Sans',sans-serif;outline:none;transition:border-color 0.2s;letter-spacing:0.15em;}
.input-wrap input:focus{border-color:var(--gold);}
.input-wrap input::placeholder{letter-spacing:0;color:var(--muted);}
.btn-login{width:100%;padding:16px;background:linear-gradient(135deg,var(--gold),var(--gold2));border:none;border-radius:var(--radius);color:#0a0a0f;font-size:1rem;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;transition:opacity 0.2s,transform 0.15s;margin-top:8px;}
.btn-login:hover{opacity:0.9;transform:translateY(-1px);}
.login-error{color:var(--danger);font-size:0.85rem;margin-top:12px;display:none;}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}

/* APP */
#app{display:none;min-height:100vh;flex-direction:column;}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:260px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:100;transition:transform 0.3s;}
.sidebar-logo{padding:28px 24px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;}
.sidebar-logo .icon{width:38px;height:38px;background:linear-gradient(135deg,var(--gold),var(--gold2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.sidebar-logo span{font-family:'Playfair Display',serif;font-size:1.25rem;font-weight:700;background:linear-gradient(135deg,var(--gold),var(--gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.sidebar-nav{flex:1;padding:16px 12px;overflow-y:auto;}
.nav-label{font-size:0.72rem;text-transform:uppercase;letter-spacing:0.12em;color:var(--muted);padding:12px 12px 6px;}
.nav-btn{display:flex;align-items:center;gap:10px;width:100%;padding:10px 14px;border:none;background:none;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:0.9rem;cursor:pointer;border-radius:10px;text-align:left;transition:background 0.15s,color 0.15s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.nav-btn:hover{background:var(--surface2);color:var(--text);}
.nav-btn.active{background:rgba(201,168,76,0.12);color:var(--gold);}
.nav-btn .nav-icon{font-size:1rem;flex-shrink:0;}
.folder-list{padding-left:8px;}
.folder-item{display:flex;align-items:center;}
.folder-item .nav-btn{flex:1;}
.folder-del{background:none;border:none;color:transparent;cursor:pointer;padding:6px;border-radius:6px;font-size:0.8rem;transition:color 0.15s,background 0.15s;}
.folder-item:hover .folder-del{color:var(--danger);}
.folder-del:hover{background:rgba(224,85,85,0.1);}
.sidebar-bottom{padding:16px 12px;border-top:1px solid var(--border);}
.cloud-badge{display:flex;align-items:center;gap:6px;padding:8px 14px;font-size:0.78rem;color:var(--success);background:rgba(76,175,125,0.08);border-radius:8px;margin-bottom:8px;}

.main{margin-left:260px;flex:1;display:flex;flex-direction:column;min-height:100vh;}
.topbar{position:sticky;top:0;z-index:50;background:rgba(10,10,15,0.85);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;gap:16px;}
.topbar-title{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:700;flex:1;}
.search-bar{display:flex;align-items:center;gap:8px;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;padding:8px 14px;transition:border-color 0.2s;}
.search-bar:focus-within{border-color:var(--gold);}
.search-bar input{background:none;border:none;outline:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.9rem;width:160px;}
.search-bar input::placeholder{color:var(--muted);}
.view-toggle{display:flex;gap:4px;background:var(--surface2);border-radius:8px;padding:3px;}
.view-btn{background:none;border:none;color:var(--muted);cursor:pointer;padding:5px 8px;border-radius:6px;font-size:0.95rem;transition:background 0.15s,color 0.15s;}
.view-btn.active{background:var(--surface);color:var(--gold);}
.content{padding:28px;flex:1;}

.upload-zone{border:2px dashed var(--border);border-radius:var(--radius);padding:40px;text-align:center;cursor:pointer;transition:border-color 0.2s,background 0.2s;margin-bottom:16px;position:relative;}
.upload-zone:hover,.upload-zone.drag-over{border-color:var(--gold);background:rgba(201,168,76,0.04);}
.upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;}
.upload-zone .uz-icon{font-size:2.5rem;margin-bottom:10px;}
.upload-zone h3{font-size:1rem;font-weight:600;margin-bottom:4px;}
.upload-zone p{color:var(--muted);font-size:0.85rem;}

.upload-progress{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;margin-bottom:20px;display:none;}
.up-top{display:flex;justify-content:space-between;font-size:0.85rem;margin-bottom:8px;}
.up-name{color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:70%;}
.up-pct{color:var(--gold);font-weight:600;}
.up-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden;}
.up-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));border-radius:3px;transition:width 0.15s;width:0%;}

.stats-bar{display:flex;gap:16px;margin-bottom:28px;flex-wrap:wrap;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;flex:1;min-width:120px;}
.stat-card .sv{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:700;color:var(--gold);}
.stat-card .sl{font-size:0.78rem;color:var(--muted);margin-top:2px;}

.section-header{display:flex;align-items:center;gap:12px;margin-bottom:20px;}
.section-header h2{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700;}
.badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:2px 10px;font-size:0.78rem;color:var(--muted);}

.items-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px;}
.items-list{display:flex;flex-direction:column;gap:8px;}

.item-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:border-color 0.2s,transform 0.2s,box-shadow 0.2s;position:relative;animation:cardIn 0.35s ease both;}
@keyframes cardIn{from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:scale(1)}}
.item-card:hover{border-color:var(--gold);transform:translateY(-3px);box-shadow:0 12px 32px rgba(0,0,0,0.4);}
.item-thumb{width:100%;aspect-ratio:1;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:3rem;overflow:hidden;}
.item-thumb img{width:100%;height:100%;object-fit:cover;}
.item-info{padding:12px;}
.item-name{font-size:0.85rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px;}
.item-comment{font-size:0.78rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.item-meta{font-size:0.72rem;color:var(--muted);margin-top:4px;}
.item-actions{position:absolute;top:8px;right:8px;display:flex;gap:4px;opacity:0;transition:opacity 0.15s;}
.item-card:hover .item-actions{opacity:1;}
.action-btn{background:rgba(10,10,15,0.85);backdrop-filter:blur(4px);border:1px solid var(--border);border-radius:7px;color:var(--text);cursor:pointer;padding:5px 7px;font-size:0.8rem;transition:background 0.15s,color 0.15s;}
.action-btn:hover{background:var(--gold);color:#000;}
.action-btn.del:hover{background:var(--danger);color:#fff;border-color:var(--danger);}

.list-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);display:flex;align-items:center;gap:14px;padding:12px 16px;cursor:pointer;transition:border-color 0.2s;animation:cardIn 0.3s ease both;}
.list-item:hover{border-color:var(--gold);}
.list-thumb{width:48px;height:48px;border-radius:8px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:1.5rem;flex-shrink:0;overflow:hidden;}
.list-thumb img{width:100%;height:100%;object-fit:cover;}
.list-info{flex:1;min-width:0;}
.list-name{font-size:0.9rem;font-weight:500;}
.list-comment{font-size:0.8rem;color:var(--muted);}
.list-meta{font-size:0.75rem;color:var(--muted);white-space:nowrap;}
.list-acts{display:flex;gap:6px;opacity:0;transition:opacity 0.15s;}
.list-item:hover .list-acts{opacity:1;}

.folder-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;cursor:pointer;transition:border-color 0.2s,transform 0.2s;text-align:center;animation:cardIn 0.3s ease both;}
.folder-card:hover{border-color:var(--gold);transform:translateY(-2px);}
.folder-card .fi{font-size:2.5rem;margin-bottom:8px;}
.folder-card h4{font-size:0.9rem;font-weight:500;}
.folder-card p{font-size:0.78rem;color:var(--muted);margin-top:2px;}

.breadcrumb{display:flex;align-items:center;gap:6px;font-size:0.85rem;color:var(--muted);margin-bottom:20px;flex-wrap:wrap;}
.breadcrumb span{cursor:pointer;transition:color 0.15s;}
.breadcrumb span:hover{color:var(--gold);}
.breadcrumb .sep{color:var(--border);}
.breadcrumb .cur{color:var(--text);cursor:default;}

.empty-state{text-align:center;padding:60px 20px;color:var(--muted);}
.empty-state .ei{font-size:3.5rem;margin-bottom:12px;}
.empty-state h3{font-size:1rem;font-weight:500;color:var(--text);margin-bottom:4px;}
.empty-state p{font-size:0.85rem;}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);backdrop-filter:blur(8px);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn 0.2s ease;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:20px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;animation:slideUp 0.25s ease;box-shadow:var(--shadow);}
@keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-header{padding:24px 24px 0;display:flex;align-items:center;justify-content:space-between;}
.modal-header h3{font-family:'Playfair Display',serif;font-size:1.3rem;}
.modal-close{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--muted);cursor:pointer;padding:6px 10px;font-size:1rem;transition:color 0.15s;}
.modal-close:hover{color:var(--text);}
.modal-body{padding:20px 24px 24px;}
.modal-img{width:100%;border-radius:var(--radius);max-height:320px;object-fit:contain;background:var(--surface2);margin-bottom:16px;}
.form-group{margin-bottom:16px;}
.form-group label{display:block;font-size:0.82rem;color:var(--muted);margin-bottom:6px;}
.form-group input,.form-group textarea,.form-group select{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.9rem;padding:12px 14px;outline:none;transition:border-color 0.2s;resize:vertical;}
.form-group input:focus,.form-group textarea:focus,.form-group select:focus{border-color:var(--gold);}
.form-group select option{background:var(--surface2);}
.btn{padding:11px 20px;border-radius:var(--radius);font-family:'DM Sans',sans-serif;font-size:0.9rem;font-weight:600;cursor:pointer;border:none;transition:opacity 0.2s,transform 0.15s;}
.btn:hover{opacity:0.88;transform:translateY(-1px);}
.btn-primary{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000;}
.btn-ghost{background:var(--surface2);border:1.5px solid var(--border);color:var(--text);}
.btn-danger{background:var(--danger);color:#fff;}
.btn-row{display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap;}

.toast{position:fixed;bottom:28px;right:28px;z-index:9000;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 18px;font-size:0.88rem;box-shadow:var(--shadow);animation:toastIn 0.3s ease;max-width:300px;}
@keyframes toastIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:var(--muted);}

@media(max-width:768px){
  .sidebar{transform:translateX(-100%);}
  .sidebar.open{transform:translateX(0);}
  .main{margin-left:0;}
  .items-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));}
  .search-bar input{width:100px;}
  .topbar{padding:12px 16px;gap:10px;}
  .content{padding:16px;}
}
.mobile-menu-btn{display:none;background:none;border:none;color:var(--text);cursor:pointer;font-size:1.3rem;}
@media(max-width:768px){.mobile-menu-btn{display:flex;}}
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading-screen">
  <div class="loader-ring"></div>
  <p id="loading-msg">Connecting to vault…</p>
</div>

<!-- LOGIN -->
<div id="login-page">
  <div class="login-card">
    <div class="vault-icon">🔐</div>
    <h1>My Private Vault</h1>
    <p>Enter your password to access your files</p>
    <div class="input-wrap">
      <input type="password" id="pw-input" placeholder="Enter password…"/>
    </div>
    <button class="btn-login" onclick="tryLogin()">Unlock Vault</button>
    <div class="login-error" id="login-err">❌ Incorrect password. Try again.</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="icon">🔐</div>
      <span>My Vault</span>
    </div>
    <div class="sidebar-nav">
      <div class="nav-label">Library</div>
      <button class="nav-btn active" id="nav-all" onclick="navigate('all')"><span class="nav-icon">🏠</span> All Files</button>
      <button class="nav-btn" id="nav-photos" onclick="navigate('photos')"><span class="nav-icon">🖼️</span> Photos</button>
      <button class="nav-btn" id="nav-videos" onclick="navigate('videos')"><span class="nav-icon">🎬</span> Videos</button>
      <button class="nav-btn" id="nav-docs" onclick="navigate('docs')"><span class="nav-icon">📄</span> Documents</button>
      <button class="nav-btn" id="nav-other" onclick="navigate('other')"><span class="nav-icon">📦</span> Other</button>
      <div class="nav-label" style="margin-top:8px;">Folders</div>
      <div class="folder-list" id="folder-nav-list"></div>
      <button class="nav-btn" onclick="showNewFolderModal()" style="margin-top:4px;"><span class="nav-icon">➕</span> New Folder</button>
    </div>
    <div class="sidebar-bottom">
      <div class="cloud-badge">🔥 Synced with Firebase</div>
      <button class="nav-btn" onclick="logout()"><span class="nav-icon">🚪</span> Lock Vault</button>
    </div>
  </div>

  <div class="main">
    <div class="topbar">
      <button class="mobile-menu-btn" onclick="toggleSidebar()">☰</button>
      <div class="topbar-title" id="page-title">All Files</div>
      <div class="search-bar">
        <span>🔍</span>
        <input type="text" id="search-input" placeholder="Search…" oninput="renderContent()"/>
      </div>
      <div class="view-toggle">
        <button class="view-btn active" id="vb-grid" onclick="setView('grid')" title="Grid">⊞</button>
        <button class="view-btn" id="vb-list" onclick="setView('list')" title="List">☰</button>
      </div>
    </div>
    <div class="content" id="content-area"></div>
  </div>
</div>

<!-- ITEM MODAL -->
<div class="modal-overlay" id="item-modal" style="display:none" onclick="closeModalOnBg(event,'item-modal')">
  <div class="modal">
    <div class="modal-header">
      <h3 id="item-modal-title">File Details</h3>
      <button class="modal-close" onclick="closeModal('item-modal')">✕</button>
    </div>
    <div class="modal-body">
      <div id="item-preview-wrap"></div>
      <div class="form-group"><label>File Name</label><input type="text" id="edit-name"/></div>
      <div class="form-group"><label>Caption / Comment</label><textarea id="edit-comment" rows="3" placeholder="Add a note or caption…"></textarea></div>
      <div class="form-group"><label>Move to Folder</label><select id="edit-folder"></select></div>
      <div class="btn-row">
        <button class="btn btn-ghost" onclick="closeModal('item-modal')">Cancel</button>
        <button class="btn btn-primary" onclick="saveItemEdits()">Save &amp; Sync</button>
      </div>
    </div>
  </div>
</div>

<!-- FOLDER MODAL -->
<div class="modal-overlay" id="folder-modal" style="display:none" onclick="closeModalOnBg(event,'folder-modal')">
  <div class="modal">
    <div class="modal-header">
      <h3>Create New Folder</h3>
      <button class="modal-close" onclick="closeModal('folder-modal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group"><label>Folder Name</label><input type="text" id="folder-name-input" placeholder="e.g. Family Photos 2024"/></div>
      <div class="btn-row">
        <button class="btn btn-ghost" onclick="closeModal('folder-modal')">Cancel</button>
        <button class="btn btn-primary" onclick="createFolder()">Create Folder</button>
      </div>
    </div>
  </div>
</div>

<!-- DELETE MODAL -->
<div class="modal-overlay" id="del-modal" style="display:none" onclick="closeModalOnBg(event,'del-modal')">
  <div class="modal">
    <div class="modal-header">
      <h3>Delete File</h3>
      <button class="modal-close" onclick="closeModal('del-modal')">✕</button>
    </div>
    <div class="modal-body">
      <p style="color:var(--muted);margin-bottom:20px;">Are you sure you want to permanently delete <strong id="del-name" style="color:var(--text)"></strong>? This cannot be undone.</p>
      <div class="btn-row">
        <button class="btn btn-ghost" onclick="closeModal('del-modal')">Cancel</button>
        <button class="btn btn-danger" onclick="confirmDelete()">Delete Forever</button>
      </div>
    </div>
  </div>
</div>

<!-- Firebase SDKs -->
<script type="module">
import { initializeApp }                        from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, doc,
         addDoc, setDoc, getDoc, getDocs,
         updateDoc, deleteDoc, onSnapshot,
         query, orderBy }                       from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// ═══════════════════════════════════════════════
//  FIREBASE CONFIG
// ═══════════════════════════════════════════════
const firebaseConfig = {
  apiKey:            "AIzaSyA7wV1kqYMoE0Wt834R0p8dvIurwwz-zJI",
  authDomain:        "my-vault-fafc5.firebaseapp.com",
  projectId:         "my-vault-fafc5",
  storageBucket:     "my-vault-fafc5.firebasestorage.app",
  messagingSenderId: "1076932455218",
  appId:             "1:1076932455218:web:34cc758cb7d633c28c852b"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

// ═══════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════
const PASS = '08073819126';
let st = { view:'grid', section:'all', editingId:null, deletingId:null, files:[], folders:[] };
let unsubFiles = null, unsubFolders = null;

// ═══════════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════════
setLoadMsg('Ready');
document.getElementById('loading-screen').style.display = 'none';

// ═══════════════════════════════════════════════
//  LOGIN / LOGOUT
// ═══════════════════════════════════════════════
window.tryLogin = async function(){
  if(document.getElementById('pw-input').value === PASS){
    document.getElementById('login-page').style.display = 'none';
    document.getElementById('app').style.display        = 'flex';
    setLoadMsg('Loading your vault…');
    startListeners();
  } else {
    const e = document.getElementById('login-err');
    e.style.display = 'block';
    e.style.animation = 'none';
    setTimeout(()=>e.style.animation='shake 0.4s ease', 10);
  }
};

window.logout = function(){
  if(unsubFiles)   { unsubFiles();   unsubFiles=null;   }
  if(unsubFolders) { unsubFolders(); unsubFolders=null; }
  document.getElementById('app').style.display        = 'none';
  document.getElementById('login-page').style.display = 'flex';
  document.getElementById('pw-input').value = '';
  document.getElementById('login-err').style.display = 'none';
  st.files=[]; st.folders=[];
};

document.addEventListener('keydown', e=>{
  if(e.key==='Enter' && document.getElementById('login-page').style.display!=='none') window.tryLogin();
});

// ═══════════════════════════════════════════════
//  REAL-TIME LISTENERS  ← this is what syncs
//  across devices instantly
// ═══════════════════════════════════════════════
function startListeners(){
  // Folders listener
  const foldersQ = query(collection(db,'folders'), orderBy('name'));
  unsubFolders = onSnapshot(foldersQ, snap=>{
    st.folders = snap.docs.map(d=>({id:d.id, ...d.data()}));
    renderContent();
  }, err=>{ console.error('Folders sync error:', err); toast('⚠️ Folder sync error'); });

  // Files listener
  const filesQ = query(collection(db,'files'), orderBy('createdAt','desc'));
  unsubFiles = onSnapshot(filesQ, snap=>{
    st.files = snap.docs.map(d=>({id:d.id, ...d.data()}));
    renderContent();
  }, err=>{ console.error('Files sync error:', err); toast('⚠️ File sync error'); });
}

// ═══════════════════════════════════════════════
//  UPLOAD
// ═══════════════════════════════════════════════
window.handleFileDrop = function(e){
  e.preventDefault(); e.currentTarget.classList.remove('drag-over');
  const f = e.dataTransfer?.files || e.target.files;
  if(f && f.length) window.uploadFiles(f);
};

window.uploadFiles = async function(list){
  const files = Array.from(list); if(!files.length) return;
  const pw = document.getElementById('upload-progress-wrap');
  const pf = document.getElementById('up-fill');
  const pn = document.getElementById('up-name-text');
  const pp = document.getElementById('up-pct-text');
  if(pw) pw.style.display='block';

  let folderId   = st.section.startsWith('folder:') ? st.section.replace('folder:','') : null;

  for(let i=0; i<files.length; i++){
    const file = files[i];
    if(pn) pn.textContent = `(${i+1}/${files.length}) ${file.name}`;
    if(pf) pf.style.width = '0%';
    if(pp) pp.textContent = 'Reading…';

    try{
      // Convert file to base64
      const base64 = await toBase64(file, (pct)=>{
        if(pf) pf.style.width = (pct*0.9)+'%';
        if(pp) pp.textContent = Math.round(pct*0.9)+'%';
      });

      if(pn) pn.textContent = `(${i+1}/${files.length}) Saving to cloud…`;
      if(pf) pf.style.width = '95%';
      if(pp) pp.textContent = '95%';

      const ftype = getType(file.name, file.type);
      const rec = {
        name:      file.name,
        data:      base64,        // stored directly in Firestore
        type:      ftype,
        mime:      file.type,
        size:      file.size,
        comment:   '',
        folderId:  folderId,
        createdAt: Date.now(),
      };

      await addDoc(collection(db,'files'), rec);
      // onSnapshot listener auto-updates st.files and re-renders

      if(pf) pf.style.width = '100%';
      if(pp) pp.textContent = '✓';
      toast(`☁️ Uploaded: ${file.name}`);

    }catch(err){
      toast(`❌ Failed: ${file.name} — ${err.message}`);
      console.error(err);
    }
  }

  setTimeout(()=>{ if(pw) pw.style.display='none'; }, 1000);
};

function toBase64(file, onProgress){
  return new Promise((res, rej)=>{
    const reader = new FileReader();
    reader.onprogress = e=>{ if(e.lengthComputable && onProgress) onProgress((e.loaded/e.total)*100); };
    reader.onload    = e => res(e.target.result);
    reader.onerror   = ()=> rej(new Error('Read failed'));
    reader.readAsDataURL(file);
  });
}

// ═══════════════════════════════════════════════
//  FOLDERS
// ═══════════════════════════════════════════════
window.showNewFolderModal = function(){
  document.getElementById('folder-name-input').value='';
  document.getElementById('folder-modal').style.display='flex';
  setTimeout(()=>document.getElementById('folder-name-input').focus(),100);
};

window.createFolder = async function(){
  const name = document.getElementById('folder-name-input').value.trim();
  if(!name) return;
  await addDoc(collection(db,'folders'),{ name, createdAt:Date.now() });
  closeModal('folder-modal');
  toast(`📁 Folder "${name}" created`);
};

window.deleteFolder = async function(id){
  if(!confirm('Delete this folder? Files inside will be moved to root.')) return;
  await deleteDoc(doc(db,'folders',id));
  // Move files to root
  const toMove = st.files.filter(f=>f.folderId===id);
  for(const f of toMove){
    await updateDoc(doc(db,'files',f.id),{ folderId: null });
  }
  if(st.section==='folder:'+id) navigate('all');
};

// ═══════════════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════════════
window.navigate = function(sec){
  st.section=sec;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const b=document.getElementById('nav-'+sec);
  if(b)b.classList.add('active');
  document.getElementById('search-input').value='';
  renderContent();
  if(window.innerWidth<=768) document.getElementById('sidebar').classList.remove('open');
};
window.toggleSidebar = ()=>document.getElementById('sidebar').classList.toggle('open');
window.setView = function(v){
  st.view=v;
  document.getElementById('vb-grid').classList.toggle('active',v==='grid');
  document.getElementById('vb-list').classList.toggle('active',v==='list');
  renderContent();
};

// ═══════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════
function getType(name,mime){
  const ext=name.split('.').pop().toLowerCase();
  if(mime&&mime.startsWith('image/'))return'photo';
  if(mime&&mime.startsWith('video/'))return'video';
  if(['mp4','webm','mov','avi','mkv','flv'].includes(ext))return'video';
  if(['jpg','jpeg','png','gif','webp','bmp','svg','heic'].includes(ext))return'photo';
  if(['pdf','doc','docx','xls','xlsx','ppt','pptx','txt','csv','rtf'].includes(ext))return'doc';
  return'other';
}
function icon(type,name){
  if(type==='photo')return'🖼️'; if(type==='video')return'🎬';
  const e=name.split('.').pop().toLowerCase();
  if(e==='pdf')return'📕'; if(['doc','docx'].includes(e))return'📘';
  if(['xls','xlsx'].includes(e))return'📗'; if(['ppt','pptx'].includes(e))return'📙';
  if(['txt','rtf','csv'].includes(e))return'📄'; return'📦';
}
function fmtSize(b){
  if(!b)return'0 B'; if(b<1024)return b+' B';
  if(b<1048576)return(b/1024).toFixed(1)+' KB';
  if(b<1073741824)return(b/1048576).toFixed(1)+' MB';
  return(b/1073741824).toFixed(2)+' GB';
}
function fmtDate(ts){if(!ts)return'';return new Date(ts).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});}
function esc(s){if(!s)return'';return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function setLoadMsg(m){const el=document.getElementById('loading-msg');if(el)el.textContent=m;}

// ═══════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════
function renderContent(){
  renderSidebarFolders();
  const search = document.getElementById('search-input')?.value.toLowerCase()||'';
  const sec    = st.section;
  let files=[...st.files], title='All Files', showFolders=false;

  if(sec==='all')         { showFolders=true; }
  else if(sec==='photos') { files=files.filter(f=>f.type==='photo'); title='Photos'; }
  else if(sec==='videos') { files=files.filter(f=>f.type==='video'); title='Videos'; }
  else if(sec==='docs')   { files=files.filter(f=>f.type==='doc');   title='Documents'; }
  else if(sec==='other')  { files=files.filter(f=>f.type==='other'); title='Other Files'; }
  else if(sec.startsWith('folder:')){
    const fid=sec.replace('folder:','');
    const folder=st.folders.find(f=>f.id===fid);
    title=folder?folder.name:'Folder';
    files=files.filter(f=>f.folderId===fid);
  }
  if(search){ files=files.filter(f=>f.name.toLowerCase().includes(search)||(f.comment||'').toLowerCase().includes(search)); showFolders=false; }

  document.getElementById('page-title').textContent=title;
  const fiv = showFolders ? st.folders : [];
  let html  = '';

  // Stats
  if(sec==='all'&&!search){
    const tp=st.files.filter(f=>f.type==='photo').length;
    const tv=st.files.filter(f=>f.type==='video').length;
    const ts=st.files.reduce((s,f)=>s+(f.size||0),0);
    html+=`<div class="stats-bar">
      <div class="stat-card"><div class="sv">${st.files.length}</div><div class="sl">Total Files</div></div>
      <div class="stat-card"><div class="sv">${tp}</div><div class="sl">Photos</div></div>
      <div class="stat-card"><div class="sv">${tv}</div><div class="sl">Videos</div></div>
      <div class="stat-card"><div class="sv">${st.folders.length}</div><div class="sl">Folders</div></div>
    </div>`;
  }

  // Breadcrumb
  if(sec.startsWith('folder:')){
    const fid=sec.replace('folder:','');
    const folder=st.folders.find(f=>f.id===fid);
    html+=`<div class="breadcrumb"><span onclick="navigate('all')">🏠 All Files</span><span class="sep">›</span><span class="cur">📁 ${folder?esc(folder.name):'Folder'}</span></div>`;
  }

  // Upload zone
  html+=`<div class="upload-zone" ondragover="event.preventDefault();this.classList.add('drag-over')" ondragleave="this.classList.remove('drag-over')" ondrop="handleFileDrop(event)">
    <input type="file" multiple onchange="uploadFiles(this.files)"/>
    <div class="uz-icon">☁️</div>
    <h3>Upload Files</h3>
    <p>Drag & drop or click — syncs to all your devices instantly via Firebase</p>
  </div>
  <div class="upload-progress" id="upload-progress-wrap">
    <div class="up-top"><span class="up-name" id="up-name-text">Uploading…</span><span class="up-pct" id="up-pct-text">0%</span></div>
    <div class="up-bar"><div class="up-fill" id="up-fill"></div></div>
  </div>`;

  // Folders
  if(fiv.length>0){
    html+=`<div class="section-header"><h2>Folders</h2><span class="badge">${fiv.length}</span></div>
    <div class="items-grid" style="margin-bottom:32px;">
      ${fiv.map(f=>{const c=st.files.filter(fi=>fi.folderId===f.id).length;
        return`<div class="folder-card" onclick="navigate('folder:${f.id}')"><div class="fi">📁</div><h4>${esc(f.name)}</h4><p>${c} item${c!==1?'s':''}</p></div>`;}).join('')}
    </div>`;
  }

  // Files
  html+=`<div class="section-header"><h2>${sec.startsWith('folder:')?'Files in this folder':sec==='all'?'All Files':title}</h2><span class="badge">${files.length}</span></div>`;
  if(files.length===0){
    html+=`<div class="empty-state"><div class="ei">📭</div><h3>No files here yet</h3><p>${search?'No results match your search.':'Upload files using the box above.'}</p></div>`;
  } else {
    if(st.view==='grid') html+=`<div class="items-grid">${files.map(gridCard).join('')}</div>`;
    else                 html+=`<div class="items-list">${files.map(listItem).join('')}</div>`;
  }
  document.getElementById('content-area').innerHTML=html;
}

function renderSidebarFolders(){
  const el=document.getElementById('folder-nav-list'); if(!el)return;
  el.innerHTML=st.folders.map(f=>`
    <div class="folder-item">
      <button class="nav-btn ${st.section==='folder:'+f.id?'active':''}" onclick="navigate('folder:${f.id}')">
        <span class="nav-icon">📁</span>
        <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(f.name)}</span>
      </button>
      <button class="folder-del" onclick="deleteFolder('${f.id}')" title="Delete folder">🗑</button>
    </div>`).join('');
}

function gridCard(f){
  const th = f.type==='photo'
    ? `<div class="item-thumb"><img src="${f.data}" alt="${esc(f.name)}" loading="lazy"/></div>`
    : `<div class="item-thumb">${icon(f.type,f.name)}</div>`;
  return`<div class="item-card" onclick="openItem('${f.id}')">
    ${th}
    <div class="item-info">
      <div class="item-name">${esc(f.name)}</div>
      ${f.comment?`<div class="item-comment">💬 ${esc(f.comment)}</div>`:''}
      <div class="item-meta">${fmtDate(f.createdAt)}${f.size?' · '+fmtSize(f.size):''}</div>
    </div>
    <div class="item-actions">
      <button class="action-btn" onclick="event.stopPropagation();openItem('${f.id}')">✏️</button>
      <button class="action-btn del" onclick="event.stopPropagation();askDelete('${f.id}')">🗑</button>
    </div>
  </div>`;
}

function listItem(f){
  const th = f.type==='photo'
    ? `<div class="list-thumb"><img src="${f.data}" alt="" loading="lazy"/></div>`
    : `<div class="list-thumb">${icon(f.type,f.name)}</div>`;
  return`<div class="list-item" onclick="openItem('${f.id}')">
    ${th}
    <div class="list-info">
      <div class="list-name">${esc(f.name)}</div>
      ${f.comment?`<div class="list-comment">💬 ${esc(f.comment)}</div>`:''}
    </div>
    <div class="list-meta">${fmtDate(f.createdAt)}${f.size?' · '+fmtSize(f.size):''}</div>
    <div class="list-acts">
      <button class="action-btn" onclick="event.stopPropagation();openItem('${f.id}')">✏️</button>
      <button class="action-btn del" onclick="event.stopPropagation();askDelete('${f.id}')">🗑</button>
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════
//  ITEM MODAL
// ═══════════════════════════════════════════════
window.openItem = function(id){
  const f=st.files.find(x=>x.id===id); if(!f)return;
  st.editingId=id;
  document.getElementById('item-modal-title').textContent=f.name;
  document.getElementById('edit-name').value=f.name;
  document.getElementById('edit-comment').value=f.comment||'';
  let preview='';
  if(f.type==='photo'){
    preview=`<img class="modal-img" src="${f.data}" alt="${esc(f.name)}"/>`;
  } else if(f.type==='video'){
    preview=`<video class="modal-img" controls src="${f.data}" style="width:100%;border-radius:var(--radius);max-height:300px;background:#000;margin-bottom:16px;"></video>`;
  } else {
    preview=`<div style="text-align:center;padding:30px;font-size:4rem;margin-bottom:12px;">${icon(f.type,f.name)}</div>`;
  }
  document.getElementById('item-preview-wrap').innerHTML=preview;
  let opts=`<option value="">— No Folder (Root) —</option>`;
  opts+=st.folders.map(x=>`<option value="${x.id}" ${f.folderId===x.id?'selected':''}>${esc(x.name)}</option>`).join('');
  document.getElementById('edit-folder').innerHTML=opts;
  document.getElementById('item-modal').style.display='flex';
};

window.saveItemEdits = async function(){
  const f=st.files.find(x=>x.id===st.editingId); if(!f)return;
  const updates = {
    name:     document.getElementById('edit-name').value.trim()||f.name,
    comment:  document.getElementById('edit-comment').value.trim(),
    folderId: document.getElementById('edit-folder').value||null,
  };
  await updateDoc(doc(db,'files',f.id), updates);
  // onSnapshot auto-updates everything on all devices
  closeModal('item-modal');
  toast('✅ Saved & synced to all devices');
};

// ═══════════════════════════════════════════════
//  DELETE
// ═══════════════════════════════════════════════
window.askDelete = function(id){
  const f=st.files.find(x=>x.id===id); if(!f)return;
  st.deletingId=id;
  document.getElementById('del-name').textContent=f.name;
  document.getElementById('del-modal').style.display='flex';
};

window.confirmDelete = async function(){
  await deleteDoc(doc(db,'files',st.deletingId));
  // onSnapshot auto-removes from all devices
  closeModal('del-modal');
  toast('🗑 Deleted from all devices');
};

// ═══════════════════════════════════════════════
//  MODAL UTILS
// ═══════════════════════════════════════════════
window.closeModal = function(id){ document.getElementById(id).style.display='none'; };
window.closeModalOnBg = function(e,id){ if(e.target===document.getElementById(id)) closeModal(id); };

let toastTimer=null;
window.toast = function(msg){
  let t=document.querySelector('.toast'); if(t)t.remove();
  if(toastTimer) clearTimeout(toastTimer);
  t=document.createElement('div'); t.className='toast'; t.textContent=msg;
  document.body.appendChild(t);
  toastTimer=setTimeout(()=>t.remove(), 4000);
};

document.addEventListener('keydown',e=>{
  if(e.key==='Escape')['item-modal','folder-modal','del-modal'].forEach(id=>{
    if(document.getElementById(id).style.display!=='none') closeModal(id);
  });
  if(e.key==='Enter'&&document.getElementById('folder-modal').style.display!=='none') createFolder();
});
</script>
